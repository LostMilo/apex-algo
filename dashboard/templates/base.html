<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Trading Dashboard{% endblock %}</title>
    <meta name="description" content="Autonomous Trading Algorithm Dashboard">
    <style>
        /* ── Reset & Base ── */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg-primary: #0a0e17;
            --bg-secondary: #111827;
            --bg-card: #1a1f2e;
            --bg-card-hover: #222839;
            --border: #2a3042;
            --text-primary: #e2e8f0;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --accent-blue: #3b82f6;
            --accent-green: #10b981;
            --accent-red: #ef4444;
            --accent-amber: #f59e0b;
            --accent-purple: #8b5cf6;
            --glow-blue: rgba(59, 130, 246, 0.15);
            --glow-green: rgba(16, 185, 129, 0.15);
            --radius: 12px;
            --shadow: 0 4px 24px rgba(0,0,0,0.3);
        }

        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
        }

        /* ── Layout ── */
        .layout {
            display: flex;
            min-height: 100vh;
        }

        /* ── Sidebar ── */
        .sidebar {
            width: 240px;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border);
            padding: 24px 16px;
            display: flex;
            flex-direction: column;
            position: fixed;
            top: 0;
            left: 0;
            height: 100vh;
            z-index: 10;
        }

        .logo {
            font-size: 18px;
            font-weight: 700;
            color: var(--accent-blue);
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .logo-sub {
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 32px;
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 14px;
            border-radius: 8px;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
            margin-bottom: 4px;
        }

        .nav-link:hover, .nav-link.active {
            background: var(--glow-blue);
            color: var(--accent-blue);
        }

        .nav-icon { font-size: 18px; width: 24px; text-align: center; }

        .sidebar-footer {
            margin-top: auto;
            padding-top: 16px;
            border-top: 1px solid var(--border);
            font-size: 11px;
            color: var(--text-muted);
        }

        /* ── Main Content ── */
        .main {
            margin-left: 240px;
            padding: 32px;
            flex: 1;
            min-width: 0;
        }

        .page-header {
            margin-bottom: 28px;
        }

        .page-title {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .page-subtitle {
            font-size: 13px;
            color: var(--text-muted);
            margin-top: 4px;
        }

        /* ── Cards ── */
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 16px;
            margin-bottom: 28px;
        }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
            transition: all 0.2s;
        }

        .card:hover {
            background: var(--bg-card-hover);
            box-shadow: var(--shadow);
        }

        .card-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .card-value {
            font-size: 28px;
            font-weight: 700;
            font-family: 'JetBrains Mono', monospace;
            letter-spacing: -1px;
        }

        .card-change {
            font-size: 12px;
            margin-top: 4px;
            font-weight: 500;
        }

        .positive { color: var(--accent-green); }
        .negative { color: var(--accent-red); }
        .neutral { color: var(--text-muted); }

        /* ── Tables ── */
        .table-wrapper {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
            margin-bottom: 28px;
        }

        .table-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .table-title {
            font-size: 14px;
            font-weight: 600;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-align: left;
            padding: 12px 20px;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
        }

        td {
            padding: 12px 20px;
            font-size: 13px;
            border-bottom: 1px solid var(--border);
            font-family: 'JetBrains Mono', monospace;
        }

        tr:last-child td { border-bottom: none; }

        tr:hover { background: var(--bg-card-hover); }

        /* ── Badges ── */
        .badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 100px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .badge-trending {
            background: rgba(59, 130, 246, 0.15);
            color: var(--accent-blue);
        }

        .badge-ranging {
            background: rgba(245, 158, 11, 0.15);
            color: var(--accent-amber);
        }

        .badge-long {
            background: rgba(16, 185, 129, 0.15);
            color: var(--accent-green);
        }

        .badge-short {
            background: rgba(239, 68, 68, 0.15);
            color: var(--accent-red);
        }

        .badge-active {
            background: rgba(16, 185, 129, 0.15);
            color: var(--accent-green);
        }

        .badge-inactive {
            background: rgba(100, 116, 139, 0.15);
            color: var(--text-muted);
        }

        /* ── Status dot ── */
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
            animation: pulse 2s infinite;
        }

        .status-dot.live { background: var(--accent-green); }
        .status-dot.offline { background: var(--accent-red); animation: none; }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* ── Section ── */
        .section {
            margin-bottom: 28px;
        }

        .section-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 16px;
        }

        /* ── Responsive ── */
        @media (max-width: 768px) {
            .sidebar { display: none; }
            .main { margin-left: 0; padding: 16px; }
            .card-grid { grid-template-columns: 1fr 1fr; }
        }

        /* ── Auto-refresh indicator ── */
        .refresh-bar {
            position: fixed;
            top: 0;
            left: 240px;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--accent-blue), var(--accent-purple));
            animation: refreshProgress 60s linear infinite;
            z-index: 100;
        }

        @keyframes refreshProgress {
            0% { transform: scaleX(0); transform-origin: left; }
            100% { transform: scaleX(1); transform-origin: left; }
        }
    </style>
</head>
<body>
    <div class="refresh-bar"></div>

    <div class="layout">
        <!-- Sidebar -->
        <nav class="sidebar">
            <div class="logo">AlgoTrader</div>
            <div class="logo-sub">Autonomous System</div>

            <a href="/" class="nav-link {% if page == 'overview' %}active{% endif %}">
                <span class="nav-icon">📊</span> Overview
            </a>
            <a href="/strategies" class="nav-link {% if page == 'strategies' %}active{% endif %}">
                <span class="nav-icon">🎯</span> Strategies
            </a>
            <a href="/trades" class="nav-link {% if page == 'trades' %}active{% endif %}">
                <span class="nav-icon">📋</span> Trade Log
            </a>
            <a href="/backtest" class="nav-link {% if page == 'backtest' %}active{% endif %}">
                <span class="nav-icon">📈</span> Backtest
            </a>

            <div class="sidebar-footer">
                <span class="status-dot live"></span> System Active<br>
                <span style="margin-left: 16px;">v1.0 · Paper Trading</span>
            </div>
        </nav>

        <!-- Main Content -->
        <main class="main">
            {% block content %}{% endblock %}
        </main>
    </div>

    <script>
        // Auto-refresh every 60 seconds
        setTimeout(() => location.reload(), 60000);
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
